<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'JetBrains Mono', 'Ubuntu', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E95420"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#E95420">CDS View Syntax — Key Elements</text>

  <!-- Annotation block -->
  <rect x="40" y="50" width="720" height="60" rx="6" fill="#FFF3ED" stroke="#E95420" stroke-width="1.5"/>
  <text x="60" y="72" font-size="11" fill="#1e293b" font-weight="bold">@AbapCatalog.sqlViewName: 'ZPRAC_SQL_SIMPLE'</text>
  <text x="60" y="90" font-size="11" fill="#1e293b" font-weight="bold">@AccessControl.authorizationCheck: #CHECK</text>
  <text x="390" y="72" font-size="9" fill="#64748b">── Annotations (metadata declarations)</text>

  <!-- View definition -->
  <rect x="40" y="130" width="720" height="40" rx="6" fill="#E0F2FE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="155" font-size="12" fill="#1e293b" font-weight="bold">define view ZPRAC_CDS_SIMPLE</text>
  <text x="390" y="155" font-size="9" fill="#64748b">── View declaration (entity name)</text>

  <!-- SELECT line -->
  <rect x="40" y="190" width="720" height="40" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="60" y="215" font-size="12" fill="#1e293b" font-weight="bold">  as select from /dmo/travel</text>
  <text x="390" y="215" font-size="9" fill="#64748b">── Source entity (CDS view or DB table)</text>

  <!-- Field list -->
  <rect x="40" y="250" width="720" height="180" rx="6" fill="#FEFCE8" stroke="#EAB308" stroke-width="1.5"/>
  <text x="60" y="275" font-size="11" fill="#1e293b">{</text>
  <text x="80" y="300" font-size="11" fill="#1e293b">  key travel_id    as TravelId,</text>
  <text x="80" y="320" font-size="11" fill="#1e293b">      agency_id    as AgencyId,</text>
  <text x="80" y="340" font-size="11" fill="#1e293b">      customer_id  as CustomerId,</text>
  <text x="80" y="360" font-size="11" fill="#1e293b">      total_price  as TotalPrice,</text>
  <text x="80" y="380" font-size="11" fill="#1e293b">      currency_code as CurrencyCode,</text>
  <text x="80" y="400" font-size="11" fill="#1e293b">      @Semantics.amount.currencyCode: 'CurrencyCode'</text>
  <text x="80" y="420" font-size="11" fill="#1e293b">      booking_fee  as BookingFee</text>
  <text x="60" y="440" font-size="11" fill="#1e293b">}</text>
  <text x="350" y="300" font-size="9" fill="#64748b">── Element list with aliases</text>
  <text x="350" y="320" font-size="9" fill="#64748b">   key = primary key element</text>
  <text x="350" y="380" font-size="9" fill="#64748b">── Field-level annotations</text>

  <!-- Arrow flow -->
  <line x1="220" y1="120" x2="220" y2="135" stroke="#E95420" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="175" x2="220" y2="192" stroke="#E95420" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="235" x2="220" y2="252" stroke="#E95420" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <text x="200" y="128" text-anchor="middle" font-size="8" fill="#E95420">ANNOTATE</text>
  <text x="200" y="183" text-anchor="middle" font-size="8" fill="#E95420">DEFINE</text>
  <text x="200" y="245" text-anchor="middle" font-size="8" fill="#E95420">SELECT</text>
</svg>
