<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'JetBrains Mono', 'Ubuntu', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E95420"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#E95420">CDS Join Types — Comparison</text>

  <!-- INNER JOIN -->
  <rect x="40" y="50" width="400" height="100" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="60" y="75" font-size="13" font-weight="bold" fill="#16A34A">INNER JOIN</text>
  <text x="60" y="98" font-size="10" fill="#1e293b">define view ZV_TRAVEL_AGENCY</text>
  <text x="60" y="115" font-size="10" fill="#1e293b">  as select from /dmo/travel as t</text>
  <text x="60" y="132" font-size="10" fill="#1e293b">    <tspan fill="#E95420" font-weight="bold">inner join</tspan> /dmo/agency as a</text>
  <text x="60" y="149" font-size="9" fill="#64748b">    on t.agency_id = a.agency_id</text>
  <text x="310" y="70" font-size="9" fill="#64748b" font-style="italic">Only matching rows from both tables</text>

  <!-- LEFT JOIN -->
  <rect x="460" y="50" width="400" height="100" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="1.5"/>
  <text x="480" y="75" font-size="13" font-weight="bold" fill="#CA8A04">LEFT OUTER JOIN</text>
  <text x="480" y="98" font-size="10" fill="#1e293b">define view ZV_TRAVEL_AGENCY</text>
  <text x="480" y="115" font-size="10" fill="#1e293b">  as select from /dmo/travel as t</text>
  <text x="480" y="132" font-size="10" fill="#1e293b">    <tspan fill="#E95420" font-weight="bold">left outer join</tspan> /dmo/agency as a</text>
  <text x="480" y="149" font-size="9" fill="#64748b">    on t.agency_id = a.agency_id</text>
  <text x="700" y="70" font-size="9" fill="#64748b" font-style="italic">All left rows, nulls on right miss</text>

  <!-- RIGHT JOIN -->
  <rect x="40" y="180" width="400" height="100" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="60" y="205" font-size="13" font-weight="bold" fill="#DC2626">RIGHT OUTER JOIN</text>
  <text x="60" y="228" font-size="10" fill="#1e293b">define view ZV_AGENCY_TRAVEL</text>
  <text x="60" y="245" font-size="10" fill="#1e293b">  as select from /dmo/travel as t</text>
  <text x="60" y="262" font-size="10" fill="#1e293b">    <tspan fill="#E95420" font-weight="bold">right outer join</tspan> /dmo/agency as a</text>
  <text x="60" y="279" font-size="9" fill="#64748b">    on t.agency_id = a.agency_id</text>
  <text x="310" y="200" font-size="9" fill="#64748b" font-style="italic">All right rows, nulls on left miss</text>

  <!-- CROSS JOIN -->
  <rect x="460" y="180" width="400" height="100" rx="8" fill="#EDE9FE" stroke="#A855F7" stroke-width="1.5"/>
  <text x="480" y="205" font-size="13" font-weight="bold" fill="#9333EA">CROSS JOIN</text>
  <text x="480" y="228" font-size="10" fill="#1e293b">define view ZV_TRAVEL_DATES</text>
  <text x="480" y="245" font-size="10" fill="#1e293b">  as select from /dmo/travel</text>
  <text x="480" y="262" font-size="10" fill="#1e293b">    <tspan fill="#E95420" font-weight="bold">cross join</tspan> /dmo/date_dim</text>
  <text x="480" y="279" font-size="9" fill="#64748b">    (no ON condition — Cartesian product)</text>
  <text x="700" y="200" font-size="9" fill="#64748b" font-style="italic">Every row × every row</text>

  <!-- Comparison table -->
  <rect x="40" y="310" width="820" height="170" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">When to Use Each Join</text>

  <text x="60" y="365" font-size="10" font-weight="bold" fill="#64748b">Join Type</text>
  <text x="250" y="365" font-size="10" font-weight="bold" fill="#64748b">Use Case</text>
  <text x="550" y="365" font-size="10" font-weight="bold" fill="#64748b">Performance</text>

  <line x1="60" y1="372" x2="780" y2="372" stroke="#E2E8F0" stroke-width="1"/>

  <text x="60" y="392" font-size="10" fill="#16A34A" font-weight="bold">INNER</text>
  <text x="250" y="392" font-size="10" fill="#1e293b">Only rows that exist in BOTH sources</text>
  <text x="550" y="392" font-size="10" fill="#1e293b">Fastest — smallest result set</text>

  <text x="60" y="417" font-size="10" fill="#CA8A04" font-weight="bold">LEFT</text>
  <text x="250" y="417" font-size="10" fill="#1e293b">ALL rows from left, even if no match on right</text>
  <text x="550" y="417" font-size="10" fill="#1e293b">Moderate — left table drives</text>

  <text x="60" y="442" font-size="10" fill="#DC2626" font-weight="bold">RIGHT</text>
  <text x="250" y="442" font-size="10" fill="#1e293b">ALL rows from right, even if no match on left</text>
  <text x="550" y="442" font-size="10" fill="#1e293b">Moderate — right table drives</text>

  <text x="60" y="467" font-size="10" fill="#9333EA" font-weight="bold">CROSS</text>
  <text x="250" y="467" font-size="10" fill="#1e293b">Cartesian product (every combo), no condition</text>
  <text x="550" y="467" font-size="10" fill="#1e293b">Slow — N×M rows, use sparingly</text>
</svg>
